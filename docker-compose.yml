# AdSpark — Docker Compose configuration (prod profile only).
#
# This file ships the PRODUCTION-mode container. There is intentionally
# no `dev` profile: `npm run dev` on the host already works and
# bind-mounting source into a Windows/WSL2 container is a known
# performance trap. Keep the two DX paths cleanly separate:
#
#   - Host dev:      `npm run dev` (fast HMR, native filesystem)
#   - Container:     `docker compose up` (production parity, portable)
#
# First-run checklist:
#
#   1. `cp .env.docker.example .env.docker`
#   2. Fill in OPENAI_API_KEY (and S3_* vars if STORAGE_MODE=s3)
#   3. `docker compose up --build`
#   4. Browse http://localhost:3000
#
# Reverse-proxy deployment note: the pipeline budget is 120s and the
# client timeout is 135s. Any proxy in front of this container
# (Cloud Run, ALB, nginx) MUST have an idle/request timeout of at
# least 140 seconds. `curl http://localhost:3000/api/healthz` returns
# the exact recommended value so config drift is catchable in CI.

services:
  adspark:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Version baked into /api/healthz responses. Override via
        # `APP_VERSION=1.2.3 docker compose up --build` when tagging.
        APP_VERSION: ${APP_VERSION:-dev}
    image: adspark:latest
    container_name: adspark

    # tini as PID 1 — forwards SIGTERM/SIGINT to Next.js so the
    # instrumentation.ts shutdown hook actually receives the signal.
    # Node 20+ handles signals as PID 1 correctly on its own, but
    # `init: true` is belt-and-suspenders for zero cost.
    init: true

    # Host port override: `HOST_PORT=8080 docker compose up` binds to
    # 8080 locally. Default 3000 matches `npm run dev` so reviewers
    # don't need to remember a different URL.
    ports:
      - "${HOST_PORT:-3000}:3000"

    # Secrets + config come from .env.docker (gitignored + dockerignored).
    # .env.docker.example is the committed template.
    env_file:
      - .env.docker

    environment:
      NODE_ENV: production

    # Named volume for the local-mode output directory. Using a named
    # volume (not a bind mount to `./output`) means:
    #   1. Docker initializes the volume with the image layer's
    #      ownership — no host UID mismatch on Linux where the host
    #      user is 1000 and the container user is 1001.
    #   2. The volume survives `docker compose down` and lets the
    #      reviewer see generated creatives across restarts.
    #   3. The reviewer can still exec into the container and copy
    #      files out with `docker cp adspark:/app/output ./output`.
    volumes:
      - adspark-output:/app/output

    # Graceful shutdown window. PIPELINE_BUDGET_MS is 120 seconds and
    # a request that started at T=0 may need up to that long to finish.
    # Default compose stop_grace_period is 10s — nowhere near enough.
    # 150s = 120s pipeline budget + 30s buffer for the HTTP response
    # to flush and the drain to complete.
    #
    # During this window, `/api/healthz` returns 503 (see
    # instrumentation.ts), which tells upstream load balancers to
    # stop routing new requests while in-flight ones drain.
    stop_grace_period: 150s

    # Resource limits. Sharp + @napi-rs/canvas + parallel DALL-E
    # fetches can easily peak at 1.5GB during a 6-image brief.
    # 2GB memory + 2 CPUs is comfortable headroom. Cloud Run / ECS
    # deploys can raise these; the numbers here are a production-
    # sane default that also fits on a reviewer's laptop.
    #
    # NOTE: `deploy.resources.limits` is honored by `docker compose`
    # v2.15+ without Swarm mode. Older versions will silently ignore
    # this block — not an error, just no enforcement.
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

    # Redundant with the Dockerfile HEALTHCHECK but declared here
    # explicitly so compose ps / `docker compose events` surface the
    # health state and `depends_on: service_healthy` works if other
    # services get added later.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/api/healthz').then(r => { if (r.status !== 200) process.exit(1); }).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

    restart: unless-stopped

volumes:
  adspark-output:
    # Named volume managed by Docker. Remove with
    # `docker volume rm adspark_adspark-output` if you want a clean
    # output state between runs.
